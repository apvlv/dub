# DEPRECATED: This file is kept for backwards compatibility.
#
# For self-hosting, use the root docker-compose.yml instead:
#   cd ../.. && docker compose up -d
#
# For development with the new setup:
#   cd ../.. && docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# See /docker/README.md for documentation.
#
# This minimal configuration can still be used for basic local development
# if you only need MySQL, PlanetScale proxy, and email testing.

version: "3.8"

services:
  ps-mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: planetscale
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    command:
      [
        "--max_connections=1000",
        "--default-authentication-plugin=mysql_native_password",
      ]
    ports:
      - 3306:3306
    volumes:
      - ps-mysql:/var/lib/mysql

  planetscale-proxy:
    image: ghcr.io/mattrobenolt/ps-http-sim:latest
    command:
      [
        "-mysql-no-pass",
        "-listen-port=3900",
        "-mysql-dbname=planetscale",
        "-mysql-addr=ps-mysql",
      ]
    depends_on:
      - ps-mysql
    ports:
      - 3900:3900
    links:
      - ps-mysql

  mailhog:
    image: "mailhog/mailhog:latest"
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  ps-mysql:
