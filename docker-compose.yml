# Dub Self-Hosted Docker Compose Configuration
# Production-ready setup with all required services
#
# Usage:
#   1. Copy .env.docker.example to .env.docker
#   2. Configure your environment variables
#   3. Run: docker compose up -d
#
# Services:
#   - app: Main Next.js application (port 8888)
#   - mysql: MySQL database (port 3306)
#   - redis: Redis for caching and queues (port 6379)
#   - clickhouse: ClickHouse for analytics (port 8123)
#   - minio: S3-compatible object storage (port 9000, console 9001)
#   - mailhog: Email testing (SMTP 1025, UI 8025)
#   - worker: BullMQ background worker
#   - traefik: Reverse proxy (optional, ports 80, 443)

services:
  # ===================
  # Main Application
  # ===================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: dub-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8888}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://dub:${MYSQL_PASSWORD:-dubpassword}@mysql:3306/dub
      - USE_LOCAL_REDIS=true
      - USE_LOCAL_QUEUE=true
      - REDIS_URL=redis://redis:6379
      - USE_LOCAL_CLICKHOUSE=true
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=dub
      - CLICKHOUSE_USER=dub
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhousepassword}
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_PUBLIC_ENDPOINT=${STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - STORAGE_BASE_URL=${STORAGE_BASE_URL:-http://localhost:9000/dub-public}
      - STORAGE_PUBLIC_BUCKET=${STORAGE_PUBLIC_BUCKET:-dub-public}
      - STORAGE_PRIVATE_BUCKET=${STORAGE_PRIVATE_BUCKET:-dub-private}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:8888}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Dub}
      - NEXT_PUBLIC_APP_DOMAIN=${NEXT_PUBLIC_APP_DOMAIN:-localhost:8888}
      - NEXT_PUBLIC_APP_SHORT_DOMAIN=${NEXT_PUBLIC_APP_SHORT_DOMAIN:-localhost:8888}
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dub.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dub.entrypoints=websecure"
      - "traefik.http.routers.dub.tls.certresolver=letsencrypt"
      - "traefik.http.services.dub.loadbalancer.server.port=3000"

  # ===================
  # Background Worker
  # ===================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: dub-worker
    restart: unless-stopped
    command: ["node", "apps/web/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://dub:${MYSQL_PASSWORD:-dubpassword}@mysql:3306/dub
      - USE_LOCAL_REDIS=true
      - USE_LOCAL_QUEUE=true
      - REDIS_URL=redis://redis:6379
      - USE_LOCAL_CLICKHOUSE=true
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=dub
      - CLICKHOUSE_USER=dub
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhousepassword}
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - dub-network
    profiles:
      - worker

  # ===================
  # MySQL Database
  # ===================
  mysql:
    image: mysql:8.0
    container_name: dub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: dub
      MYSQL_USER: dub
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dubpassword}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dub-network

  # ===================
  # PlanetScale Proxy (for development compatibility)
  # ===================
  planetscale-proxy:
    image: ghcr.io/mattrobenolt/ps-http-sim:latest
    container_name: dub-ps-proxy
    restart: unless-stopped
    command:
      - -mysql-addr=mysql
      - -mysql-user=dub
      - -mysql-pass=${MYSQL_PASSWORD:-dubpassword}
      - -mysql-dbname=dub
      - -listen-port=3900
    ports:
      - "${PS_PROXY_PORT:-3900}:3900"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dub-network
    profiles:
      - development

  # ===================
  # Redis
  # ===================
  redis:
    image: redis:7-alpine
    container_name: dub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dub-network

  # ===================
  # ClickHouse (Analytics)
  # ===================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: dub-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: dub
      CLICKHOUSE_USER: dub
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhousepassword}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./docker/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - dub-network

  # ===================
  # MinIO (S3-Compatible Storage)
  # ===================
  minio:
    image: minio/minio:latest
    container_name: dub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dub-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: dub-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-miniosecret};
      mc mb --ignore-existing myminio/${STORAGE_PUBLIC_BUCKET:-dub-public};
      mc mb --ignore-existing myminio/${STORAGE_PRIVATE_BUCKET:-dub-private};
      mc anonymous set download myminio/${STORAGE_PUBLIC_BUCKET:-dub-public};
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - dub-network

  # ===================
  # MailHog (Email Testing)
  # ===================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dub-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - dub-network

  # ===================
  # Traefik Reverse Proxy (Optional)
  # ===================
  traefik:
    image: traefik:v3.0
    container_name: dub-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - dub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$xyz$$abc}"
    profiles:
      - proxy

# ===================
# Named Volumes
# ===================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  minio-data:
    driver: local
  traefik-certs:
    driver: local

# ===================
# Networks
# ===================
networks:
  dub-network:
    driver: bridge
