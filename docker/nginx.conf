# Dub Nginx Configuration
# Alternative to Traefik for reverse proxy
#
# Usage:
#   1. Copy this file to /etc/nginx/conf.d/dub.conf
#   2. Replace ${APP_DOMAIN} with your actual domain
#   3. Configure SSL certificates (see below)
#   4. Run: nginx -t && systemctl reload nginx
#
# For Docker, add this service to docker-compose.yml:
#
#   nginx:
#     image: nginx:alpine
#     container_name: dub-nginx
#     ports:
#       - "80:80"
#       - "443:443"
#     volumes:
#       - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#       - /etc/letsencrypt:/etc/letsencrypt:ro
#     depends_on:
#       - app
#     networks:
#       - dub-network

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=track:10m rate=1000r/s;

# Upstream for the Dub application
upstream dub_app {
    server app:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ${APP_DOMAIN} *.${APP_DOMAIN};

    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${APP_DOMAIN};

    # SSL Configuration
    # Update paths to your SSL certificates
    ssl_certificate /etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Client settings
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API routes with rate limiting
    location /api/ {
        limit_req zone=api burst=200 nodelay;
        proxy_pass http://dub_app;
    }

    # Click tracking endpoint (higher rate limit)
    location /api/track/ {
        limit_req zone=track burst=2000 nodelay;
        proxy_pass http://dub_app;
    }

    # Static assets with caching
    location /_next/static/ {
        proxy_pass http://dub_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /public/ {
        proxy_pass http://dub_app;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Favicon and other static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://dub_app;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # WebSocket support for development
    location /_next/webpack-hmr {
        proxy_pass http://dub_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # All other requests
    location / {
        proxy_pass http://dub_app;
    }

    # Health check endpoint (no rate limiting)
    location /api/health {
        proxy_pass http://dub_app;
        access_log off;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

